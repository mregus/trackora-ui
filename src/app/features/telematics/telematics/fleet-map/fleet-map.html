<section class="fleet-map-page">

  <h2>Fleet Map</h2>

  <div class="map-legend">
    <div class="legend-summary">
      <strong>{{ locations().length }}</strong>
      <span>Vehicles</span>
    </div>

    <div class="legend-item">
      <span class="legend-color moving"></span>
      <span>Moving</span>
    </div>

    <div class="legend-item">
      <span class="legend-color low-fuel"></span>
      <span>Low Fuel</span>
    </div>

    <div class="legend-item">
      <span class="legend-color check-engine"></span>
      <span>Check Engine</span>
    </div>

    <div class="legend-item">
      <span class="legend-color offline"></span>
      <span>Stopped / Offline</span>
    </div>
  </div>

  <div id="fleet-map"></div>

  <div id="fleet-map"></div>

</section>
