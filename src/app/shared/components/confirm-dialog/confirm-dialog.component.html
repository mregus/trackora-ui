<h2 mat-dialog-title>
  {{ data.title }}
</h2>

<mat-dialog-content>
  <p>{{ data.message }}</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="cancel()">
    {{ data.cancelText || 'Cancel' }}
  </button>

  <button mat-raised-button color="warn" type="button" (click)="confirm()">
    {{ data.confirmText || 'Delete' }}
  </button>
</mat-dialog-actions>
